name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ci-start:
    name: CI Start
    runs-on: ubuntu-latest
    steps:
      - name: job-start
        run: echo "job-start ts=$(date --rfc-3339=seconds)"

  preflight:
    name: Pre-flight
    needs: [ci-start]
    uses: paruff/ufawkespipe/.github/workflows/reusable-preflight.yml@v1.1.0

  lint:
    name: Lint
    needs: [preflight]
    uses: paruff/ufawkespipe/.github/workflows/reusable-lint.yml@v1.1.0
    with:
      auto-detect: true

  build:
    name: Build & Validate
    needs: [lint]
    uses: paruff/ufawkespipe/.github/workflows/reusable-build.yml@v1.1.0
    with:
      fail-on-latest: true

  security:
    name: Security Scanning
    needs: [lint]
    uses: paruff/ufawkespipe/.github/workflows/reusable-security-scanning.yml@v1.1.0
    with:
      scan-type: all
      severity-threshold: MEDIUM
      fail-on-critical: true
      upload-sarif: true

  dependency-review:
    name: Dependency Review
    needs: [lint]
    uses: paruff/ufawkespipe/.github/workflows/reusable-dependency-review.yml@v1.1.0
    with:
      fail-on-severity: high
      comment-summary-in-pr: "true"

  tests:
    name: Tests
    needs: [build, security, dependency-review]
    uses: paruff/ufawkespipe/.github/workflows/reusable-tests.yml@v1.1.0
    with:
      test-tiers: "unit,docs"
      python-version: "3.11"
      coverage-threshold: 80
      coverage-paths: ""

  pipeline-complete:
    name: Pipeline Complete
    needs: [ci-start, preflight, lint, build, security, dependency-review, tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: job-start
        run: echo "job-start ts=$(date --rfc-3339=seconds)"

      - name: Check results
        run: |
          echo "=== Pipeline Results ==="
          for dep in preflight lint build security dependency-review tests; do
            echo "$dep: ${{ needs[dep].result }}"
          done

          if [ "${{ needs.preflight.result }}" == "failure" ] || \
             [ "${{ needs.lint.result }}" == "failure" ] || \
             [ "${{ needs.build.result }}" == "failure" ] || \
             [ "${{ needs.security.result }}" == "failure" ] || \
             [ "${{ needs.dependency-review.result }}" == "failure" ] || \
             [ "${{ needs.tests.result }}" == "failure" ]; then
            echo "❌ Pipeline FAILED"
            exit 1
          fi
          echo "✅ Pipeline PASSED"

      - name: job-finish
        if: always()
        run: echo "job-finish ts=$(date --rfc-3339=seconds)"
