---
name: ufawkes-resources

services:
  ingress-gateway:
    image: traefik:v3.0
    container_name: fawkes-ingress
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - fawkes-backbone-net

  sso-auth:
    image: authelia/authelia:latest
    container_name: fawkes-sso
    restart: unless-stopped
    volumes:
      - ./config/authelia:/config
    environment:
      - AUTHELIA_JWT_SECRET=${AUTHELIA_JWT_SECRET:?}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY:?}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET:?}
    networks:
      - fawkes-backbone-net

  shared-postgres:
    image: postgres:16-alpine
    container_name: fawkes-postgres
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-fawkes}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?}
      - POSTGRES_DB=${POSTGRES_DB:-fawkes}
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
    networks:
      - fawkes-backbone-net

  cache-backend:
    image: valkey/valkey:7.2-alpine
    container_name: fawkes-cache
    restart: unless-stopped
    environment:
      - VALKEY_PASSWORD=${VALKEY_PASSWORD:?}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - fawkes-backbone-net

networks:
  fawkes-backbone-net:
    driver: bridge
