---
# uFawkesRes Authelia Configuration
# Minimal viable config for first cold start — no SMTP, no LDAP, no OIDC.
# File-based user store, SQLite storage, filesystem notifier.

host: 0.0.0.0
port: 9091

log:
  level: info

theme: light

jwt_secret: ${AUTHELIA_JWT_SECRET}

default_redirection_url: http://localhost:9091

totp:
  issuer: ufawkesres.local
  period: 30
  skew: 1
  digits: 6

authentication_backend:
  file:
    path: /config/users_database.yml

access_control:
  default_policy: one_factor
  rules:
    - domain: "*"
      policy: one_factor

session:
  name: ufawkesres_session
  secret: ${AUTHELIA_SESSION_SECRET}
  expiration: 3600
  inactivity: 300
  domain: localhost

regulation:
  max_retries: 5
  find_time: 2m
  ban_time: 5m

storage:
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt
